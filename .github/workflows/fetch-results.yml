name: Fetch Match Results

on:
  # Run every 10 minutes during tournament hours (IST 8 AM–10 PM = UTC 2:30–16:30)
  # April 25 (Saturday) and April 26 (Sunday)
  schedule:
    - cron: '*/10 2-17 25 4 *'   # April 25
    - cron: '*/10 2-17 26 4 *'   # April 26

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Fetch results from CricHeroes
        run: python scripts/fetch_results.py

      - name: Commit updated files
        run: |
          git config user.name  "Results Bot"
          git config user.email "action@github.com"
          git add results.json scripts/men_matches.json points_table.json
          # Only commit if something actually changed
          git diff --staged --quiet || git commit -m "chore: update match results [skip ci]"
          git push
